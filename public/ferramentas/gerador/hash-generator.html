<!-- ==========================================================
     FERRAMENTA: Hash Generator
     Uso: cole este bloco dentro do <main> do site DigitalTech.
     Sem <head>, <body>, header, footer ou menu.
     CSS/JS isolados sob o prefixo ".dthash-".
     Usa apenas a Web Crypto API nativa (SubtleCrypto) — por isso
     não inclui MD5, que não é suportado nativamente pelo navegador.
========================================================== -->

<section class="dthash-tool" aria-labelledby="dthash-title">

  <header class="dthash-tool__head">
    <h1 id="dthash-title" class="dthash-tool__title">Hash Generator</h1>
    <p class="dthash-tool__desc">
      Gere o hash de um texto ou arquivo direto no navegador, usando a
      Web Crypto API nativa. Nenhum dado sai do seu computador.
    </p>
  </header>

  <!-- Alternância entre texto e arquivo -->
  <div class="dthash-tabs" role="tablist">
    <button type="button" class="dthash-tab dthash-tab--active" id="dthashTabText" role="tab" aria-selected="true">
      Texto
    </button>
    <button type="button" class="dthash-tab" id="dthashTabFile" role="tab" aria-selected="false">
      Arquivo
    </button>
  </div>

  <!-- Entrada de texto -->
  <div class="dthash-panel" id="dthashPanelText">
    <textarea id="dthashTextarea" class="dthash-textarea"
      placeholder="Digite ou cole o texto aqui" spellcheck="false"></textarea>
  </div>

  <!-- Entrada de arquivo -->
  <div class="dthash-panel" id="dthashPanelFile" hidden>
    <div class="dthash-drop" id="dthashDrop" tabindex="0" role="button" aria-label="Selecionar ou arrastar um arquivo">
      <input type="file" id="dthashFile" hidden>
      <p class="dthash-drop__text"><strong>Clique para escolher</strong> ou arraste um arquivo aqui</p>
      <p class="dthash-drop__file" id="dthashFileName">Nenhum arquivo selecionado</p>
    </div>
  </div>

  <!-- Configurações -->
  <div class="dthash-settings">
    <label for="dthashAlgo">Algoritmo</label>
    <select id="dthashAlgo">
      <option value="SHA-1">SHA-1</option>
      <option value="SHA-256" selected>SHA-256</option>
      <option value="SHA-384">SHA-384</option>
      <option value="SHA-512">SHA-512</option>
    </select>
  </div>

  <button class="dthash-btn dthash-btn--primary" id="dthashRun">
    Gerar hash
  </button>

  <p class="dthash-error" id="dthashError" hidden></p>

  <!-- Resultado -->
  <div class="dthash-result" id="dthashResult" hidden>
    <div class="dthash-result__bar">
      <span id="dthashResultLabel">SHA-256</span>
      <button type="button" class="dthash-copybtn" id="dthashCopy">Copiar</button>
    </div>
    <pre class="dthash-output" id="dthashOutput"></pre>
  </div>

  <button class="dthash-btn dthash-btn--download" id="dthashDownload" disabled>
    Baixar hash (.txt)
  </button>

</section>

<style>
  .dthash-tool {
    --dthash-bg:      #14161c;
    --dthash-surface: #1b1e26;
    --dthash-border:  #2a2e39;
    --dthash-text:    #e6e8ec;
    --dthash-muted:   #8b90a0;
    --dthash-accent:  #22d3c9;
    --dthash-danger:  #ff6b6b;
    --dthash-radius:  12px;

    max-width: 640px;
    margin: 2rem auto;
    padding: 1.75rem;
    background: var(--dthash-bg);
    border: 1px solid var(--dthash-border);
    border-radius: var(--dthash-radius);
    color: var(--dthash-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
  }
  .dthash-tool *, .dthash-tool *::before, .dthash-tool *::after {
    box-sizing: inherit;
  }

  .dthash-tool__title {
    margin: 0 0 0.35rem;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .dthash-tool__desc {
    margin: 0 0 1.5rem;
    color: var(--dthash-muted);
    font-size: 0.92rem;
    line-height: 1.5;
  }

  /* Abas */
  .dthash-tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .dthash-tab {
    flex: 1;
    padding: 0.55rem;
    background: var(--dthash-surface);
    border: 1px solid var(--dthash-border);
    color: var(--dthash-muted);
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .dthash-tab--active {
    border-color: var(--dthash-accent);
    color: var(--dthash-accent);
  }

  /* Entrada de texto */
  .dthash-textarea {
    width: 100%;
    min-height: 140px;
    resize: vertical;
    background: var(--dthash-surface);
    border: 1px solid var(--dthash-border);
    border-radius: 8px;
    color: var(--dthash-text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 0.75rem;
  }
  .dthash-textarea:focus-visible {
    outline: none;
    border-color: var(--dthash-accent);
  }

  /* Dropzone de arquivo */
  .dthash-drop {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    text-align: center;
    padding: 2rem 1rem;
    border: 1.5px dashed var(--dthash-border);
    border-radius: var(--dthash-radius);
    background: var(--dthash-surface);
    cursor: pointer;
    transition: border-color .15s ease;
  }
  .dthash-drop:hover,
  .dthash-drop:focus-visible {
    border-color: var(--dthash-accent);
    outline: none;
  }
  .dthash-drop--over {
    border-color: var(--dthash-accent);
  }
  .dthash-drop__text {
    margin: 0;
    font-size: 0.92rem;
  }
  .dthash-drop__file {
    margin: 0;
    font-size: 0.8rem;
    color: var(--dthash-muted);
  }

  /* Configurações */
  .dthash-settings {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.25rem;
    gap: 1rem;
  }
  .dthash-settings label {
    font-size: 0.82rem;
    color: var(--dthash-muted);
  }
  .dthash-settings select {
    flex: 1;
    max-width: 220px;
    background: var(--dthash-surface);
    border: 1px solid var(--dthash-border);
    color: var(--dthash-text);
    border-radius: 8px;
    padding: 0.5rem 0.6rem;
    font-size: 0.88rem;
  }

  /* Botões */
  .dthash-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s ease, transform .05s ease;
  }
  .dthash-btn:active { transform: scale(0.99); }
  .dthash-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .dthash-btn--primary {
    background: var(--dthash-accent);
    color: #06231f;
  }
  .dthash-btn--download {
    background: transparent;
    border-color: var(--dthash-border);
    color: var(--dthash-text);
  }
  .dthash-btn--download:not(:disabled):hover {
    border-color: var(--dthash-accent);
    color: var(--dthash-accent);
  }

  /* Erro */
  .dthash-error {
    margin-top: 1rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    background: color-mix(in srgb, var(--dthash-danger) 12%, transparent);
    color: var(--dthash-danger);
    font-size: 0.85rem;
  }

  /* Resultado */
  .dthash-result {
    margin-top: 1rem;
    background: var(--dthash-surface);
    border: 1px solid var(--dthash-border);
    border-radius: var(--dthash-radius);
    overflow: hidden;
  }
  .dthash-result__bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid var(--dthash-border);
    font-size: 0.78rem;
    color: var(--dthash-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dthash-copybtn {
    background: transparent;
    border: 1px solid var(--dthash-border);
    color: var(--dthash-text);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .dthash-copybtn:hover {
    border-color: var(--dthash-accent);
    color: var(--dthash-accent);
  }
  .dthash-output {
    margin: 0;
    padding: 0.9rem;
    max-height: 160px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  @media (max-width: 480px) {
    .dthash-tool { padding: 1.25rem; }
    .dthash-settings { flex-direction: column; align-items: stretch; }
    .dthash-settings select { max-width: none; }
  }
</style>

<script>
(function () {
  "use strict";

  /* ==========================================================
     Hash Generator - 100% client-side (Web Crypto API / SubtleCrypto)
  ========================================================== */

  const tabText   = document.getElementById("dthashTabText");
  const tabFile   = document.getElementById("dthashTabFile");
  const panelText = document.getElementById("dthashPanelText");
  const panelFile = document.getElementById("dthashPanelFile");

  const textarea    = document.getElementById("dthashTextarea");
  const drop         = document.getElementById("dthashDrop");
  const fileInput     = document.getElementById("dthashFile");
  const fileNameEl    = document.getElementById("dthashFileName");
  const algoSelect    = document.getElementById("dthashAlgo");
  const runBtn         = document.getElementById("dthashRun");
  const errorEl        = document.getElementById("dthashError");
  const resultBox      = document.getElementById("dthashResult");
  const resultLabel    = document.getElementById("dthashResultLabel");
  const outputEl       = document.getElementById("dthashOutput");
  const copyBtn        = document.getElementById("dthashCopy");
  const downloadBtn    = document.getElementById("dthashDownload");

  let mode = "text";        // "text" ou "file"
  let selectedFile = null;
  let hashResult = "";

  // Alternância de abas
  function setMode(newMode) {
    mode = newMode;
    tabText.classList.toggle("dthash-tab--active", mode === "text");
    tabFile.classList.toggle("dthash-tab--active", mode === "file");
    tabText.setAttribute("aria-selected", mode === "text");
    tabFile.setAttribute("aria-selected", mode === "file");
    panelText.hidden = mode !== "text";
    panelFile.hidden = mode !== "file";
  }
  tabText.addEventListener("click", () => setMode("text"));
  tabFile.addEventListener("click", () => setMode("file"));

  // Seleção de arquivo
  drop.addEventListener("click", () => fileInput.click());
  drop.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") fileInput.click();
  });
  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) {
      selectedFile = fileInput.files[0];
      fileNameEl.textContent = selectedFile.name;
    }
  });

  ["dragenter", "dragover"].forEach((evt) => {
    drop.addEventListener(evt, (e) => {
      e.preventDefault();
      drop.classList.add("dthash-drop--over");
    });
  });
  ["dragleave", "drop"].forEach((evt) => {
    drop.addEventListener(evt, (e) => {
      e.preventDefault();
      drop.classList.remove("dthash-drop--over");
    });
  });
  drop.addEventListener("drop", (e) => {
    const file = e.dataTransfer.files[0];
    if (file) {
      selectedFile = file;
      fileNameEl.textContent = file.name;
    }
  });

  // Converte um ArrayBuffer de hash em string hexadecimal
  function bufferToHex(buffer) {
    return Array.from(new Uint8Array(buffer))
      .map((b) => b.toString(16).padStart(2, "0"))
      .join("");
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.hidden = false;
  }

  runBtn.addEventListener("click", async () => {
    errorEl.hidden = true;
    const algo = algoSelect.value;

    try {
      let data;

      if (mode === "text") {
        const text = textarea.value;
        if (!text) {
          showError("Digite algo antes de gerar o hash.");
          return;
        }
        data = new TextEncoder().encode(text);
      } else {
        if (!selectedFile) {
          showError("Selecione um arquivo antes de gerar o hash.");
          return;
        }
        data = await selectedFile.arrayBuffer();
      }

      const digest = await crypto.subtle.digest(algo, data);
      hashResult = bufferToHex(digest);

      resultLabel.textContent = algo;
      outputEl.textContent = hashResult;
      resultBox.hidden = false;
      downloadBtn.disabled = false;
    } catch (err) {
      showError("Não foi possível gerar o hash: " + err.message);
    }
  });

  copyBtn.addEventListener("click", async () => {
    if (!hashResult) return;
    try {
      await navigator.clipboard.writeText(hashResult);
      copyBtn.textContent = "Copiado!";
      setTimeout(() => { copyBtn.textContent = "Copiar"; }, 1500);
    } catch (err) {
      showError("Não foi possível copiar automaticamente. Selecione o texto manualmente.");
    }
  });

  downloadBtn.addEventListener("click", () => {
    if (!hashResult) return;
    const blob = new Blob([hashResult], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "hash.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  });
})();
</script>
