<!-- ==========================================================
     FERRAMENTA: JSON Formatter
     Uso: cole este bloco dentro do <main> do site DigitalTech.
     Sem <head>, <body>, header, footer ou menu.
     CSS/JS isolados sob o prefixo ".dtjson-" para não colidir
     com o layout global do blog nem com outras ferramentas.
========================================================== -->

<section class="dtjson-tool" aria-labelledby="dtjson-title">

  <header class="dtjson-tool__head">
    <h1 id="dtjson-title" class="dtjson-tool__title">JSON Formatter</h1>
    <p class="dtjson-tool__desc">
      Formate, valide e organize seu JSON direto no navegador, sem enviar
      nada para nenhum servidor.
    </p>
  </header>

  <!-- Entrada: colar texto ou enviar arquivo .json -->
  <div class="dtjson-input">
    <div class="dtjson-input__bar">
      <label for="dtjsonTextarea">Cole seu JSON</label>
      <button type="button" class="dtjson-filebtn" id="dtjsonFileBtn">Enviar arquivo .json</button>
      <input type="file" id="dtjsonFile" accept=".json,application/json" hidden>
    </div>
    <textarea id="dtjsonTextarea" class="dtjson-textarea"
      placeholder='{"exemplo": "cole ou arraste seu JSON aqui"}'
      spellcheck="false"></textarea>
  </div>

  <!-- Configurações -->
  <div class="dtjson-settings">
    <div class="dtjson-field">
      <label for="dtjsonIndent">Indentação</label>
      <select id="dtjsonIndent">
        <option value="2">2 espaços</option>
        <option value="4">4 espaços</option>
        <option value="tab">Tab</option>
        <option value="0">Minificado (sem espaços)</option>
      </select>
    </div>

    <label class="dtjson-checkbox">
      <input type="checkbox" id="dtjsonSort">
      Ordenar chaves em ordem alfabética
    </label>
  </div>

  <!-- Ação principal -->
  <button class="dtjson-btn dtjson-btn--primary" id="dtjsonRun">
    Formatar JSON
  </button>

  <!-- Status de validação -->
  <p class="dtjson-status" id="dtjsonStatus" hidden></p>

  <!-- Resultado -->
  <div class="dtjson-result" id="dtjsonResult" hidden>
    <div class="dtjson-result__bar">
      <span>Resultado</span>
      <button type="button" class="dtjson-copybtn" id="dtjsonCopy">Copiar</button>
    </div>
    <pre class="dtjson-output" id="dtjsonOutput"></pre>
  </div>

  <button class="dtjson-btn dtjson-btn--download" id="dtjsonDownload" disabled>
    Baixar JSON formatado
  </button>

</section>

<style>
  .dtjson-tool {
    --dtjson-bg:      #14161c;
    --dtjson-surface: #1b1e26;
    --dtjson-border:  #2a2e39;
    --dtjson-text:    #e6e8ec;
    --dtjson-muted:   #8b90a0;
    --dtjson-accent:  #22d3c9;
    --dtjson-danger:  #ff6b6b;
    --dtjson-ok:      #4ade80;
    --dtjson-radius:  12px;

    max-width: 680px;
    margin: 2rem auto;
    padding: 1.75rem;
    background: var(--dtjson-bg);
    border: 1px solid var(--dtjson-border);
    border-radius: var(--dtjson-radius);
    color: var(--dtjson-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
  }
  .dtjson-tool *, .dtjson-tool *::before, .dtjson-tool *::after {
    box-sizing: inherit;
  }

  .dtjson-tool__title {
    margin: 0 0 0.35rem;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .dtjson-tool__desc {
    margin: 0 0 1.5rem;
    color: var(--dtjson-muted);
    font-size: 0.92rem;
    line-height: 1.5;
  }

  /* Entrada */
  .dtjson-input__bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .dtjson-input__bar label {
    font-size: 0.82rem;
    color: var(--dtjson-muted);
  }
  .dtjson-filebtn {
    background: transparent;
    border: 1px solid var(--dtjson-border);
    color: var(--dtjson-text);
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .dtjson-filebtn:hover {
    border-color: var(--dtjson-accent);
    color: var(--dtjson-accent);
  }
  .dtjson-textarea {
    width: 100%;
    min-height: 180px;
    resize: vertical;
    background: var(--dtjson-surface);
    border: 1px solid var(--dtjson-border);
    border-radius: 8px;
    color: var(--dtjson-text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 0.75rem;
  }
  .dtjson-textarea:focus-visible {
    outline: none;
    border-color: var(--dtjson-accent);
  }

  /* Configurações */
  .dtjson-settings {
    display: flex;
    align-items: flex-end;
    gap: 1.25rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .dtjson-field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .dtjson-field label {
    font-size: 0.82rem;
    color: var(--dtjson-muted);
  }
  .dtjson-field select {
    background: var(--dtjson-surface);
    border: 1px solid var(--dtjson-border);
    color: var(--dtjson-text);
    border-radius: 8px;
    padding: 0.5rem 0.6rem;
    font-size: 0.88rem;
  }
  .dtjson-checkbox {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--dtjson-muted);
    padding-bottom: 0.4rem;
    cursor: pointer;
  }
  .dtjson-checkbox input {
    accent-color: var(--dtjson-accent);
  }

  /* Botões */
  .dtjson-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s ease, transform .05s ease;
  }
  .dtjson-btn:active { transform: scale(0.99); }
  .dtjson-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .dtjson-btn--primary {
    background: var(--dtjson-accent);
    color: #06231f;
  }
  .dtjson-btn--download {
    background: transparent;
    border-color: var(--dtjson-border);
    color: var(--dtjson-text);
  }
  .dtjson-btn--download:not(:disabled):hover {
    border-color: var(--dtjson-accent);
    color: var(--dtjson-accent);
  }

  /* Status */
  .dtjson-status {
    margin-top: 1rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .dtjson-status--ok {
    background: color-mix(in srgb, var(--dtjson-ok) 12%, transparent);
    color: var(--dtjson-ok);
  }
  .dtjson-status--error {
    background: color-mix(in srgb, var(--dtjson-danger) 12%, transparent);
    color: var(--dtjson-danger);
  }

  /* Resultado */
  .dtjson-result {
    margin-top: 1rem;
    background: var(--dtjson-surface);
    border: 1px solid var(--dtjson-border);
    border-radius: var(--dtjson-radius);
    overflow: hidden;
  }
  .dtjson-result__bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid var(--dtjson-border);
    font-size: 0.78rem;
    color: var(--dtjson-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dtjson-copybtn {
    background: transparent;
    border: 1px solid var(--dtjson-border);
    color: var(--dtjson-text);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .dtjson-copybtn:hover {
    border-color: var(--dtjson-accent);
    color: var(--dtjson-accent);
  }
  .dtjson-output {
    margin: 0;
    padding: 0.9rem;
    max-height: 320px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  @media (max-width: 480px) {
    .dtjson-tool { padding: 1.25rem; }
    .dtjson-settings { flex-direction: column; align-items: stretch; }
  }
</style>

<script>
(function () {
  "use strict";

  /* ==========================================================
     JSON Formatter - 100% client-side (JSON nativo do navegador)
  ========================================================== */

  const textarea    = document.getElementById("dtjsonTextarea");
  const fileBtn      = document.getElementById("dtjsonFileBtn");
  const fileInput     = document.getElementById("dtjsonFile");
  const indentSelect  = document.getElementById("dtjsonIndent");
  const sortCheckbox  = document.getElementById("dtjsonSort");
  const runBtn        = document.getElementById("dtjsonRun");
  const statusEl      = document.getElementById("dtjsonStatus");
  const resultBox     = document.getElementById("dtjsonResult");
  const outputEl      = document.getElementById("dtjsonOutput");
  const copyBtn       = document.getElementById("dtjsonCopy");
  const downloadBtn   = document.getElementById("dtjsonDownload");

  let formattedText = "";

  // Abrir seletor de arquivo
  fileBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      textarea.value = reader.result;
    };
    reader.readAsText(file);
  });

  // Permitir arrastar um arquivo .json direto sobre o textarea
  textarea.addEventListener("dragover", (e) => e.preventDefault());
  textarea.addEventListener("drop", (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => { textarea.value = reader.result; };
    reader.readAsText(file);
  });

  function showStatus(message, type) {
    statusEl.textContent = message;
    statusEl.className = "dtjson-status dtjson-status--" + type;
    statusEl.hidden = false;
  }

  // Reordena as chaves de um objeto recursivamente (alfabética)
  function sortKeys(value) {
    if (Array.isArray(value)) {
      return value.map(sortKeys);
    }
    if (value !== null && typeof value === "object") {
      const sorted = {};
      Object.keys(value).sort().forEach((key) => {
        sorted[key] = sortKeys(value[key]);
      });
      return sorted;
    }
    return value;
  }

  runBtn.addEventListener("click", () => {
    const raw = textarea.value.trim();

    if (!raw) {
      showStatus("Cole ou envie um JSON antes de formatar.", "error");
      resultBox.hidden = true;
      downloadBtn.disabled = true;
      return;
    }

    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (err) {
      showStatus("JSON inválido: " + err.message, "error");
      resultBox.hidden = true;
      downloadBtn.disabled = true;
      return;
    }

    if (sortCheckbox.checked) {
      parsed = sortKeys(parsed);
    }

    const indentValue = indentSelect.value;
    const indent = indentValue === "tab" ? "\t" : Number(indentValue);

    formattedText = JSON.stringify(parsed, null, indent || undefined);

    outputEl.textContent = formattedText;
    resultBox.hidden = false;
    downloadBtn.disabled = false;
    showStatus("JSON válido e formatado com sucesso.", "ok");
  });

  // Copiar resultado para a área de transferência
  copyBtn.addEventListener("click", async () => {
    if (!formattedText) return;
    try {
      await navigator.clipboard.writeText(formattedText);
      copyBtn.textContent = "Copiado!";
      setTimeout(() => { copyBtn.textContent = "Copiar"; }, 1500);
    } catch (err) {
      showStatus("Não foi possível copiar automaticamente. Selecione o texto manualmente.", "error");
    }
  });

  // Baixar o JSON formatado como arquivo .json
  downloadBtn.addEventListener("click", () => {
    if (!formattedText) return;

    const blob = new Blob([formattedText], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "formatado.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  });
})();
</script>
