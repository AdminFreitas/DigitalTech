<!-- ==========================================================
     FERRAMENTA: Gerador de Sitemap.xml
     Uso: cole este bloco dentro do <main> do site DigitalTech.
     Sem <head>, <body>, header, footer ou menu.
     CSS/JS isolados sob o prefixo ".dtsitemap-".
========================================================== -->

<section class="dtsitemap-tool" aria-labelledby="dtsitemap-title">

  <header class="dtsitemap-tool__head">
    <h1 id="dtsitemap-title" class="dtsitemap-tool__title">Gerador de Sitemap.xml</h1>
    <p class="dtsitemap-tool__desc">
      Cole a lista de URLs do seu site (uma por linha) e gere um
      sitemap.xml pronto para enviar ao Google Search Console.
    </p>
  </header>

  <!-- Entrada: lista de URLs -->
  <div class="dtsitemap-input">
    <label for="dtsitemapUrls">URLs do site (uma por linha)</label>
    <textarea id="dtsitemapUrls" class="dtsitemap-textarea" spellcheck="false"
      placeholder="https://digitaltech.com.br/&#10;https://digitaltech.com.br/blog/&#10;https://digitaltech.com.br/ferramentas/"></textarea>
  </div>

  <!-- Configurações -->
  <div class="dtsitemap-settings">
    <div class="dtsitemap-field">
      <label for="dtsitemapFreq">Frequência de alteração</label>
      <select id="dtsitemapFreq">
        <option value="always">Sempre</option>
        <option value="hourly">A cada hora</option>
        <option value="daily">Diariamente</option>
        <option value="weekly" selected>Semanalmente</option>
        <option value="monthly">Mensalmente</option>
        <option value="yearly">Anualmente</option>
        <option value="never">Nunca</option>
      </select>
    </div>

    <div class="dtsitemap-field">
      <label for="dtsitemapPriority">Prioridade</label>
      <select id="dtsitemapPriority">
        <option value="1.0">1.0</option>
        <option value="0.8" selected>0.8</option>
        <option value="0.6">0.6</option>
        <option value="0.4">0.4</option>
        <option value="0.2">0.2</option>
      </select>
    </div>

    <label class="dtsitemap-checkbox">
      <input type="checkbox" id="dtsitemapDate" checked>
      Incluir data de hoje como última modificação
    </label>
  </div>

  <button class="dtsitemap-btn dtsitemap-btn--primary" id="dtsitemapRun">
    Gerar sitemap.xml
  </button>

  <p class="dtsitemap-error" id="dtsitemapError" hidden></p>

  <!-- Resultado -->
  <div class="dtsitemap-result" id="dtsitemapResult" hidden>
    <div class="dtsitemap-result__bar">
      <span>Resultado</span>
      <button type="button" class="dtsitemap-copybtn" id="dtsitemapCopy">Copiar</button>
    </div>
    <pre class="dtsitemap-output" id="dtsitemapOutput"></pre>
  </div>

  <button class="dtsitemap-btn dtsitemap-btn--download" id="dtsitemapDownload" disabled>
    Baixar sitemap.xml
  </button>

</section>

<style>
  .dtsitemap-tool {
    --dtsitemap-bg:      #14161c;
    --dtsitemap-surface: #1b1e26;
    --dtsitemap-border:  #2a2e39;
    --dtsitemap-text:    #e6e8ec;
    --dtsitemap-muted:   #8b90a0;
    --dtsitemap-accent:  #22d3c9;
    --dtsitemap-danger:  #ff6b6b;
    --dtsitemap-radius:  12px;

    max-width: 680px;
    margin: 2rem auto;
    padding: 1.75rem;
    background: var(--dtsitemap-bg);
    border: 1px solid var(--dtsitemap-border);
    border-radius: var(--dtsitemap-radius);
    color: var(--dtsitemap-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
  }
  .dtsitemap-tool *, .dtsitemap-tool *::before, .dtsitemap-tool *::after {
    box-sizing: inherit;
  }

  .dtsitemap-tool__title {
    margin: 0 0 0.35rem;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .dtsitemap-tool__desc {
    margin: 0 0 1.5rem;
    color: var(--dtsitemap-muted);
    font-size: 0.92rem;
    line-height: 1.5;
  }

  /* Entrada */
  .dtsitemap-input label {
    display: block;
    font-size: 0.82rem;
    color: var(--dtsitemap-muted);
    margin-bottom: 0.5rem;
  }
  .dtsitemap-textarea {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    background: var(--dtsitemap-surface);
    border: 1px solid var(--dtsitemap-border);
    border-radius: 8px;
    color: var(--dtsitemap-text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 0.75rem;
  }
  .dtsitemap-textarea:focus-visible {
    outline: none;
    border-color: var(--dtsitemap-accent);
  }

  /* Configurações */
  .dtsitemap-settings {
    display: flex;
    align-items: flex-end;
    gap: 1.25rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .dtsitemap-field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .dtsitemap-field label {
    font-size: 0.82rem;
    color: var(--dtsitemap-muted);
  }
  .dtsitemap-field select {
    background: var(--dtsitemap-surface);
    border: 1px solid var(--dtsitemap-border);
    color: var(--dtsitemap-text);
    border-radius: 8px;
    padding: 0.5rem 0.6rem;
    font-size: 0.88rem;
  }
  .dtsitemap-checkbox {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--dtsitemap-muted);
    padding-bottom: 0.4rem;
    cursor: pointer;
  }
  .dtsitemap-checkbox input {
    accent-color: var(--dtsitemap-accent);
  }

  /* Botões */
  .dtsitemap-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .dtsitemap-btn:active { transform: scale(0.99); }
  .dtsitemap-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .dtsitemap-btn--primary {
    background: var(--dtsitemap-accent);
    color: #06231f;
  }
  .dtsitemap-btn--download {
    background: transparent;
    border: 1px solid var(--dtsitemap-border);
    color: var(--dtsitemap-text);
  }
  .dtsitemap-btn--download:not(:disabled):hover {
    border-color: var(--dtsitemap-accent);
    color: var(--dtsitemap-accent);
  }

  /* Erro */
  .dtsitemap-error {
    margin-top: 1rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    background: color-mix(in srgb, var(--dtsitemap-danger) 12%, transparent);
    color: var(--dtsitemap-danger);
    font-size: 0.85rem;
  }

  /* Resultado */
  .dtsitemap-result {
    margin-top: 1rem;
    background: var(--dtsitemap-surface);
    border: 1px solid var(--dtsitemap-border);
    border-radius: var(--dtsitemap-radius);
    overflow: hidden;
  }
  .dtsitemap-result__bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid var(--dtsitemap-border);
    font-size: 0.78rem;
    color: var(--dtsitemap-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dtsitemap-copybtn {
    background: transparent;
    border: 1px solid var(--dtsitemap-border);
    color: var(--dtsitemap-text);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .dtsitemap-copybtn:hover {
    border-color: var(--dtsitemap-accent);
    color: var(--dtsitemap-accent);
  }
  .dtsitemap-output {
    margin: 0;
    padding: 0.9rem;
    max-height: 300px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  @media (max-width: 480px) {
    .dtsitemap-tool { padding: 1.25rem; }
    .dtsitemap-settings { flex-direction: column; align-items: stretch; }
  }
</style>

<script>
(function () {
  "use strict";

  /* ==========================================================
     Gerador de Sitemap.xml - 100% client-side
  ========================================================== */

  const urlsInput   = document.getElementById("dtsitemapUrls");
  const freqSelect   = document.getElementById("dtsitemapFreq");
  const prioritySelect = document.getElementById("dtsitemapPriority");
  const dateCheckbox = document.getElementById("dtsitemapDate");
  const runBtn         = document.getElementById("dtsitemapRun");
  const errorEl        = document.getElementById("dtsitemapError");
  const resultBox      = document.getElementById("dtsitemapResult");
  const outputEl       = document.getElementById("dtsitemapOutput");
  const copyBtn        = document.getElementById("dtsitemapCopy");
  const downloadBtn    = document.getElementById("dtsitemapDownload");

  let generatedXml = "";

  // Escapa caracteres especiais de XML
  function escapeXml(value) {
    return value
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&apos;");
  }

  runBtn.addEventListener("click", () => {
    errorEl.hidden = true;

    const urls = urlsInput.value
      .split("\n")
      .map((line) => line.trim())
      .filter((line) => line.length > 0);

    if (!urls.length) {
      errorEl.textContent = "Cole ao menos uma URL antes de gerar o sitemap.";
      errorEl.hidden = false;
      resultBox.hidden = true;
      downloadBtn.disabled = true;
      return;
    }

    // Valida se todas as linhas parecem URLs válidas
    const invalid = urls.find((url) => {
      try { new URL(url); return false; } catch { return true; }
    });
    if (invalid) {
      errorEl.textContent = `URL inválida encontrada: "${invalid}"`;
      errorEl.hidden = false;
      resultBox.hidden = true;
      downloadBtn.disabled = true;
      return;
    }

    const freq = freqSelect.value;
    const priority = prioritySelect.value;
    const today = new Date().toISOString().split("T")[0];

    const entries = urls.map((url) => {
      const lines = [
        "  <url>",
        `    <loc>${escapeXml(url)}</loc>`
      ];
      if (dateCheckbox.checked) lines.push(`    <lastmod>${today}</lastmod>`);
      lines.push(`    <changefreq>${freq}</changefreq>`);
      lines.push(`    <priority>${priority}</priority>`);
      lines.push("  </url>");
      return lines.join("\n");
    });

    generatedXml =
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' +
      entries.join("\n") + "\n" +
      "</urlset>";

    outputEl.textContent = generatedXml;
    resultBox.hidden = false;
    downloadBtn.disabled = false;
  });

  copyBtn.addEventListener("click", async () => {
    if (!generatedXml) return;
    await navigator.clipboard.writeText(generatedXml);
    copyBtn.textContent = "Copiado!";
    setTimeout(() => { copyBtn.textContent = "Copiar"; }, 1500);
  });

  downloadBtn.addEventListener("click", () => {
    if (!generatedXml) return;
    const blob = new Blob([generatedXml], { type: "application/xml" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "sitemap.xml";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  });
})();
</script>
