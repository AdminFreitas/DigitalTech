<!-- ==========================================================
     FERRAMENTA: Conversor de Cores (HEX / RGB / HSL)
     Uso: cole este bloco dentro do <main> do site DigitalTech.
     Sem <head>, <body>, header, footer ou menu.
     CSS/JS isolados sob o prefixo ".dtcolor-".
========================================================== -->

<section class="dtcolor-tool" aria-labelledby="dtcolor-title">

  <header class="dtcolor-tool__head">
    <h1 id="dtcolor-title" class="dtcolor-tool__title">Conversor de Cores</h1>
    <p class="dtcolor-tool__desc">
      Converta cores entre HEX, RGB e HSL, ou use o seletor visual para
      escolher a cor que quiser.
    </p>
  </header>

  <!-- Seletor visual + amostra -->
  <div class="dtcolor-picker">
    <input type="color" id="dtcolorPicker" value="#22d3c9">
    <div class="dtcolor-swatch" id="dtcolorSwatch"></div>
  </div>

  <!-- Entrada manual -->
  <div class="dtcolor-settings">
    <div class="dtcolor-field">
      <label for="dtcolorInput">Cor (HEX, RGB ou HSL)</label>
      <input type="text" id="dtcolorInput" placeholder="#22d3c9  ·  rgb(34,211,201)  ·  hsl(177,72%,48%)" value="#22d3c9">
    </div>
  </div>

  <button class="dtcolor-btn dtcolor-btn--primary" id="dtcolorRun">
    Converter
  </button>

  <p class="dtcolor-error" id="dtcolorError" hidden></p>

  <!-- Resultado -->
  <div class="dtcolor-result" id="dtcolorResult" hidden>
    <div class="dtcolor-row">
      <span class="dtcolor-row__label">HEX</span>
      <span class="dtcolor-row__value" id="dtcolorHex"></span>
      <button type="button" class="dtcolor-row__copy" data-target="dtcolorHex">Copiar</button>
    </div>
    <div class="dtcolor-row">
      <span class="dtcolor-row__label">RGB</span>
      <span class="dtcolor-row__value" id="dtcolorRgb"></span>
      <button type="button" class="dtcolor-row__copy" data-target="dtcolorRgb">Copiar</button>
    </div>
    <div class="dtcolor-row">
      <span class="dtcolor-row__label">HSL</span>
      <span class="dtcolor-row__value" id="dtcolorHsl"></span>
      <button type="button" class="dtcolor-row__copy" data-target="dtcolorHsl">Copiar</button>
    </div>
  </div>

  <button class="dtcolor-btn dtcolor-btn--download" id="dtcolorDownload" disabled>
    Baixar (.txt)
  </button>

</section>

<style>
  .dtcolor-tool {
    --dtcolor-bg:      #14161c;
    --dtcolor-surface: #1b1e26;
    --dtcolor-border:  #2a2e39;
    --dtcolor-text:    #e6e8ec;
    --dtcolor-muted:   #8b90a0;
    --dtcolor-accent:  #22d3c9;
    --dtcolor-danger:  #ff6b6b;
    --dtcolor-radius:  12px;

    max-width: 560px;
    margin: 2rem auto;
    padding: 1.75rem;
    background: var(--dtcolor-bg);
    border: 1px solid var(--dtcolor-border);
    border-radius: var(--dtcolor-radius);
    color: var(--dtcolor-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
  }
  .dtcolor-tool *, .dtcolor-tool *::before, .dtcolor-tool *::after {
    box-sizing: inherit;
  }

  .dtcolor-tool__title {
    margin: 0 0 0.35rem;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .dtcolor-tool__desc {
    margin: 0 0 1.5rem;
    color: var(--dtcolor-muted);
    font-size: 0.92rem;
    line-height: 1.5;
  }

  /* Seletor + amostra */
  .dtcolor-picker {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .dtcolor-picker input[type="color"] {
    width: 52px;
    height: 52px;
    border: 1px solid var(--dtcolor-border);
    border-radius: 10px;
    background: none;
    cursor: pointer;
    padding: 0;
  }
  .dtcolor-swatch {
    flex: 1;
    height: 52px;
    border-radius: 10px;
    border: 1px solid var(--dtcolor-border);
    background: #22d3c9;
    transition: background .1s ease;
  }

  /* Entrada */
  .dtcolor-field label {
    display: block;
    font-size: 0.82rem;
    color: var(--dtcolor-muted);
    margin-bottom: 0.4rem;
  }
  .dtcolor-field input {
    width: 100%;
    background: var(--dtcolor-surface);
    border: 1px solid var(--dtcolor-border);
    color: var(--dtcolor-text);
    border-radius: 8px;
    padding: 0.6rem 0.7rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.88rem;
  }
  .dtcolor-field input:focus-visible {
    outline: none;
    border-color: var(--dtcolor-accent);
  }

  /* Botões */
  .dtcolor-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .dtcolor-btn:active { transform: scale(0.99); }
  .dtcolor-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .dtcolor-btn--primary {
    background: var(--dtcolor-accent);
    color: #06231f;
  }
  .dtcolor-btn--download {
    background: transparent;
    border: 1px solid var(--dtcolor-border);
    color: var(--dtcolor-text);
  }
  .dtcolor-btn--download:not(:disabled):hover {
    border-color: var(--dtcolor-accent);
    color: var(--dtcolor-accent);
  }

  /* Erro */
  .dtcolor-error {
    margin-top: 1rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    background: color-mix(in srgb, var(--dtcolor-danger) 12%, transparent);
    color: var(--dtcolor-danger);
    font-size: 0.85rem;
  }

  /* Resultado */
  .dtcolor-result {
    margin-top: 1rem;
    background: var(--dtcolor-surface);
    border: 1px solid var(--dtcolor-border);
    border-radius: var(--dtcolor-radius);
    overflow: hidden;
  }
  .dtcolor-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 0.9rem;
    border-bottom: 1px solid var(--dtcolor-border);
  }
  .dtcolor-row:last-child { border-bottom: none; }
  .dtcolor-row__label {
    font-size: 0.75rem;
    color: var(--dtcolor-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dtcolor-row__value {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.88rem;
  }
  .dtcolor-row__copy {
    background: transparent;
    border: 1px solid var(--dtcolor-border);
    color: var(--dtcolor-text);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .dtcolor-row__copy:hover {
    border-color: var(--dtcolor-accent);
    color: var(--dtcolor-accent);
  }

  @media (max-width: 480px) {
    .dtcolor-tool { padding: 1.25rem; }
    .dtcolor-row { grid-template-columns: 50px 1fr auto; }
  }
</style>

<script>
(function () {
  "use strict";

  /* ==========================================================
     Conversor de Cores - 100% client-side
  ========================================================== */

  const picker      = document.getElementById("dtcolorPicker");
  const swatch       = document.getElementById("dtcolorSwatch");
  const input         = document.getElementById("dtcolorInput");
  const runBtn         = document.getElementById("dtcolorRun");
  const errorEl        = document.getElementById("dtcolorError");
  const resultBox      = document.getElementById("dtcolorResult");
  const hexEl          = document.getElementById("dtcolorHex");
  const rgbEl          = document.getElementById("dtcolorRgb");
  const hslEl          = document.getElementById("dtcolorHsl");
  const downloadBtn    = document.getElementById("dtcolorDownload");

  let reportText = "";

  // Sincroniza o color picker nativo com o campo de texto
  picker.addEventListener("input", () => {
    input.value = picker.value;
  });

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.hidden = false;
    resultBox.hidden = true;
    downloadBtn.disabled = true;
  }

  // Interpreta HEX, RGB ou HSL e devolve {r, g, b}
  function parseColor(value) {
    const v = value.trim().toLowerCase();

    // HEX (#fff ou #ffffff)
    let match = v.match(/^#?([0-9a-f]{3}|[0-9a-f]{6})$/);
    if (match) {
      let hex = match[1];
      if (hex.length === 3) hex = hex.split("").map((c) => c + c).join("");
      const num = parseInt(hex, 16);
      return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
    }

    // RGB
    match = v.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if (match) {
      return { r: Number(match[1]), g: Number(match[2]), b: Number(match[3]) };
    }

    // HSL
    match = v.match(/^hsla?\(\s*(\d+)\s*,\s*(\d+)%\s*,\s*(\d+)%/);
    if (match) {
      return hslToRgb(Number(match[1]), Number(match[2]), Number(match[3]));
    }

    return null;
  }

  function hslToRgb(h, s, l) {
    s /= 100; l /= 100;
    const k = (n) => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = (n) => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    return {
      r: Math.round(f(0) * 255),
      g: Math.round(f(8) * 255),
      b: Math.round(f(4) * 255)
    };
  }

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;

    if (max === min) {
      h = s = 0;
    } else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
        case g: h = (b - r) / d + 2; break;
        default: h = (r - g) / d + 4;
      }
      h /= 6;
    }
    return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
  }

  function rgbToHex(r, g, b) {
    return "#" + [r, g, b].map((c) => c.toString(16).padStart(2, "0")).join("");
  }

  runBtn.addEventListener("click", () => {
    errorEl.hidden = true;
    const rgb = parseColor(input.value);

    if (!rgb) {
      showError("Não foi possível reconhecer essa cor. Use HEX, RGB ou HSL.");
      return;
    }

    const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
    const rgbText = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
    const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
    const hslText = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;

    hexEl.textContent = hex;
    rgbEl.textContent = rgbText;
    hslEl.textContent = hslText;
    swatch.style.background = hex;
    picker.value = hex;

    resultBox.hidden = false;
    downloadBtn.disabled = false;

    reportText = `HEX: ${hex}\nRGB: ${rgbText}\nHSL: ${hslText}\n`;
  });

  // Copiar valores individuais
  document.querySelectorAll(".dtcolor-row__copy").forEach((btn) => {
    btn.addEventListener("click", () => {
      const targetEl = document.getElementById(btn.dataset.target);
      navigator.clipboard.writeText(targetEl.textContent);
      btn.textContent = "Copiado!";
      setTimeout(() => { btn.textContent = "Copiar"; }, 1200);
    });
  });

  downloadBtn.addEventListener("click", () => {
    if (!reportText) return;
    const blob = new Blob([reportText], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "cor-convertida.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  });
})();
</script>
