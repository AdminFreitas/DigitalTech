<!-- ==========================================================
     FERRAMENTA: Base64 Encode/Decode
     Uso: cole este bloco dentro do <main> do site DigitalTech.
     Sem <head>, <body>, header, footer ou menu.
     CSS/JS isolados sob o prefixo ".dtb64-".
========================================================== -->

<section class="dtb64-tool" aria-labelledby="dtb64-title">

  <header class="dtb64-tool__head">
    <h1 id="dtb64-title" class="dtb64-tool__title">Conversor Base64</h1>
    <p class="dtb64-tool__desc">
      Codifique texto ou arquivos para Base64, ou decodifique uma string
      Base64 de volta ao formato original — tudo no navegador.
    </p>
  </header>

  <!-- Modo -->
  <div class="dtb64-tabs" role="tablist">
    <button type="button" class="dtb64-tab dtb64-tab--active" id="dtb64TabEncode" role="tab" aria-selected="true">
      Codificar
    </button>
    <button type="button" class="dtb64-tab" id="dtb64TabDecode" role="tab" aria-selected="false">
      Decodificar
    </button>
  </div>

  <!-- Codificar: texto ou arquivo -->
  <div class="dtb64-panel" id="dtb64PanelEncode">
    <div class="dtb64-input__bar">
      <label for="dtb64EncodeInput">Texto</label>
      <button type="button" class="dtb64-filebtn" id="dtb64FileBtn">Enviar arquivo</button>
      <input type="file" id="dtb64File" hidden>
    </div>
    <textarea id="dtb64EncodeInput" class="dtb64-textarea"
      placeholder="Digite o texto a ser codificado" spellcheck="false"></textarea>
  </div>

  <!-- Decodificar -->
  <div class="dtb64-panel" id="dtb64PanelDecode" hidden>
    <label for="dtb64DecodeInput">String Base64</label>
    <textarea id="dtb64DecodeInput" class="dtb64-textarea"
      placeholder="Cole a string Base64 aqui" spellcheck="false"></textarea>
  </div>

  <button class="dtb64-btn dtb64-btn--primary" id="dtb64Run">
    Converter
  </button>

  <p class="dtb64-error" id="dtb64Error" hidden></p>

  <!-- Resultado -->
  <div class="dtb64-result" id="dtb64Result" hidden>
    <div class="dtb64-result__bar">
      <span>Resultado</span>
      <button type="button" class="dtb64-copybtn" id="dtb64Copy">Copiar</button>
    </div>
    <pre class="dtb64-output" id="dtb64Output"></pre>
  </div>

  <button class="dtb64-btn dtb64-btn--download" id="dtb64Download" disabled>
    Baixar resultado
  </button>

</section>

<style>
  .dtb64-tool {
    --dtb64-bg:      #14161c;
    --dtb64-surface: #1b1e26;
    --dtb64-border:  #2a2e39;
    --dtb64-text:    #e6e8ec;
    --dtb64-muted:   #8b90a0;
    --dtb64-accent:  #22d3c9;
    --dtb64-danger:  #ff6b6b;
    --dtb64-radius:  12px;

    max-width: 640px;
    margin: 2rem auto;
    padding: 1.75rem;
    background: var(--dtb64-bg);
    border: 1px solid var(--dtb64-border);
    border-radius: var(--dtb64-radius);
    color: var(--dtb64-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
  }
  .dtb64-tool *, .dtb64-tool *::before, .dtb64-tool *::after {
    box-sizing: inherit;
  }

  .dtb64-tool__title {
    margin: 0 0 0.35rem;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .dtb64-tool__desc {
    margin: 0 0 1.5rem;
    color: var(--dtb64-muted);
    font-size: 0.92rem;
    line-height: 1.5;
  }

  /* Abas */
  .dtb64-tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .dtb64-tab {
    flex: 1;
    padding: 0.55rem;
    background: var(--dtb64-surface);
    border: 1px solid var(--dtb64-border);
    color: var(--dtb64-muted);
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .dtb64-tab--active {
    border-color: var(--dtb64-accent);
    color: var(--dtb64-accent);
  }

  /* Entrada */
  .dtb64-input__bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .dtb64-input__bar label,
  .dtb64-panel > label {
    font-size: 0.82rem;
    color: var(--dtb64-muted);
    display: block;
    margin-bottom: 0.5rem;
  }
  .dtb64-filebtn {
    background: transparent;
    border: 1px solid var(--dtb64-border);
    color: var(--dtb64-text);
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .dtb64-filebtn:hover {
    border-color: var(--dtb64-accent);
    color: var(--dtb64-accent);
  }
  .dtb64-textarea {
    width: 100%;
    min-height: 160px;
    resize: vertical;
    background: var(--dtb64-surface);
    border: 1px solid var(--dtb64-border);
    border-radius: 8px;
    color: var(--dtb64-text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 0.75rem;
  }
  .dtb64-textarea:focus-visible {
    outline: none;
    border-color: var(--dtb64-accent);
  }

  /* Botões */
  .dtb64-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .dtb64-btn:active { transform: scale(0.99); }
  .dtb64-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .dtb64-btn--primary {
    background: var(--dtb64-accent);
    color: #06231f;
  }
  .dtb64-btn--download {
    background: transparent;
    border: 1px solid var(--dtb64-border);
    color: var(--dtb64-text);
  }
  .dtb64-btn--download:not(:disabled):hover {
    border-color: var(--dtb64-accent);
    color: var(--dtb64-accent);
  }

  /* Erro */
  .dtb64-error {
    margin-top: 1rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    background: color-mix(in srgb, var(--dtb64-danger) 12%, transparent);
    color: var(--dtb64-danger);
    font-size: 0.85rem;
  }

  /* Resultado */
  .dtb64-result {
    margin-top: 1rem;
    background: var(--dtb64-surface);
    border: 1px solid var(--dtb64-border);
    border-radius: var(--dtb64-radius);
    overflow: hidden;
  }
  .dtb64-result__bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid var(--dtb64-border);
    font-size: 0.78rem;
    color: var(--dtb64-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dtb64-copybtn {
    background: transparent;
    border: 1px solid var(--dtb64-border);
    color: var(--dtb64-text);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .dtb64-copybtn:hover {
    border-color: var(--dtb64-accent);
    color: var(--dtb64-accent);
  }
  .dtb64-output {
    margin: 0;
    padding: 0.9rem;
    max-height: 260px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  @media (max-width: 480px) {
    .dtb64-tool { padding: 1.25rem; }
  }
</style>

<script>
(function () {
  "use strict";

  /* ==========================================================
     Conversor Base64 - 100% client-side (btoa/atob + FileReader)
  ========================================================== */

  const tabEncode  = document.getElementById("dtb64TabEncode");
  const tabDecode  = document.getElementById("dtb64TabDecode");
  const panelEncode = document.getElementById("dtb64PanelEncode");
  const panelDecode = document.getElementById("dtb64PanelDecode");

  const encodeInput  = document.getElementById("dtb64EncodeInput");
  const decodeInput  = document.getElementById("dtb64DecodeInput");
  const fileBtn        = document.getElementById("dtb64FileBtn");
  const fileInput       = document.getElementById("dtb64File");
  const runBtn           = document.getElementById("dtb64Run");
  const errorEl          = document.getElementById("dtb64Error");
  const resultBox        = document.getElementById("dtb64Result");
  const outputEl         = document.getElementById("dtb64Output");
  const copyBtn           = document.getElementById("dtb64Copy");
  const downloadBtn       = document.getElementById("dtb64Download");

  let mode = "encode";
  let resultText = "";

  function setMode(newMode) {
    mode = newMode;
    tabEncode.classList.toggle("dtb64-tab--active", mode === "encode");
    tabDecode.classList.toggle("dtb64-tab--active", mode === "decode");
    tabEncode.setAttribute("aria-selected", mode === "encode");
    tabDecode.setAttribute("aria-selected", mode === "decode");
    panelEncode.hidden = mode !== "encode";
    panelDecode.hidden = mode !== "decode";
    resultBox.hidden = true;
    errorEl.hidden = true;
    downloadBtn.disabled = true;
  }
  tabEncode.addEventListener("click", () => setMode("encode"));
  tabDecode.addEventListener("click", () => setMode("decode"));

  // Enviar arquivo direto para codificação (lido como base64)
  fileBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      // reader.result vem como "data:tipo;base64,XXXX" — extraímos só a parte base64
      resultText = reader.result.split(",")[1];
      outputEl.textContent = resultText;
      resultBox.hidden = false;
      downloadBtn.disabled = false;
      errorEl.hidden = true;
    };
    reader.readAsDataURL(file);
  });

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.hidden = false;
    resultBox.hidden = true;
    downloadBtn.disabled = true;
  }

  runBtn.addEventListener("click", () => {
    errorEl.hidden = true;

    if (mode === "encode") {
      const text = encodeInput.value;
      if (!text) { showError("Digite um texto para codificar."); return; }

      // encodeURIComponent + unescape garante suporte a acentos e emojis
      resultText = btoa(unescape(encodeURIComponent(text)));
    } else {
      const text = decodeInput.value.trim();
      if (!text) { showError("Cole uma string Base64 para decodificar."); return; }

      try {
        resultText = decodeURIComponent(escape(atob(text)));
      } catch (err) {
        showError("String Base64 inválida.");
        return;
      }
    }

    outputEl.textContent = resultText;
    resultBox.hidden = false;
    downloadBtn.disabled = false;
  });

  copyBtn.addEventListener("click", async () => {
    if (!resultText) return;
    await navigator.clipboard.writeText(resultText);
    copyBtn.textContent = "Copiado!";
    setTimeout(() => { copyBtn.textContent = "Copiar"; }, 1500);
  });

  downloadBtn.addEventListener("click", () => {
    if (!resultText) return;
    const blob = new Blob([resultText], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = mode === "encode" ? "codificado-base64.txt" : "decodificado.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  });
})();
</script>
